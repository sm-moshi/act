# Go test — unit tests with coverage
when:
  - event: manual
  - event: pull_request
  - event: push
    branch: develop

steps:
  - name: restore-cache
    failure: ignore
    image: meltwater/drone-cache
    settings:
      backend: s3
      endpoint:
        from_secret: garage_s3_endpoint
      access-key:
        from_secret: garage_s3_access_key
      secret-key:
        from_secret: garage_s3_secret_key
      region: garage
      bucket: buildkit-cache
      path-style: true
      restore: true
      cache_key: "act-go-{{ checksum \"go.sum\" }}"
      mount:
        - .go-mod-cache

  - name: test
    image: dhi.io/golang:1.26.1-dev
    environment:
      CGO_ENABLED: "0"
      GOMODCACHE: /woodpecker/src/github.com/sm-moshi/act/.go-mod-cache
    commands:
      - go test -v -cover -coverprofile=coverage.txt -covermode=atomic -timeout 20m $(go list ./... | grep -v '/pkg/container' | grep -v '/pkg/runner' | grep -v '/pkg/artifacts' | grep -v '/cmd')

  - name: rebuild-cache
    failure: ignore
    image: meltwater/drone-cache
    settings:
      backend: s3
      endpoint:
        from_secret: garage_s3_endpoint
      access-key:
        from_secret: garage_s3_access_key
      secret-key:
        from_secret: garage_s3_secret_key
      region: garage
      bucket: buildkit-cache
      path-style: true
      rebuild: true
      cache_key: "act-go-{{ checksum \"go.sum\" }}"
      mount:
        - .go-mod-cache
    when:
      - status: [success, failure]
