# Go test — unit tests with coverage
depends_on:
  - lint
when:
  - event: manual
  - event: pull_request
  - event: push
    branch: develop

steps:
  - name: test
    image: dhi.io/golang:1.26.1-debian13-dev@sha256:2eaf3936008b4a31091eda26511748c1b872925fa5f674f13fbf5b53e7e777c2
    volumes:
      - woodpecker-pipeline-cache:/woodpecker/cache
    environment:
      CGO_ENABLED: "0"
      GOMODCACHE: /woodpecker/cache/act/go-mod
      GOCACHE: /woodpecker/cache/act/go-build
    commands:
      - mkdir -p "$GOMODCACHE" "$GOCACHE"
      - go test -v -cover -coverprofile=coverage.txt -covermode=atomic -timeout 20m $(go list ./... | grep -v '/pkg/container' | grep -v '/pkg/runner' | grep -v '/pkg/artifacts' | grep -v '/cmd')
