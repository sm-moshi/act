# Go test — unit tests with coverage
when:
  - event: manual
  - event: pull_request
  - event: push
    branch: develop

steps:
  - name: test
    image: harbor.m0sh1.cc/hub/library/golang:1.24
    environment:
      CGO_ENABLED: "0"
    commands:
      - go test -v -cover -coverprofile=coverage.txt -covermode=atomic -timeout 20m ./...
