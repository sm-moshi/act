# Monthly promote — bumps VERSION on master and tags the release
when:
  - event: cron
    cron: monthly-promote
  - event: manual

steps:
  - name: promote
    image: dhi.io/golang:1.26.3-debian13-dev@sha256:972b3b41ae70170229bd24c019dd60465130be297739a9bb64d834c21ac1a27b
    volumes:
      - woodpecker-pipeline-cache:/woodpecker/cache
    environment:
      CGO_ENABLED: "0"
      GOMODCACHE: /woodpecker/cache/act/go-mod
      GOCACHE: /woodpecker/cache/act/go-build
      PROMOTE_TOKEN:
        from_secret: promote_token
    commands:
      - mkdir -p "$GOMODCACHE" "$GOCACHE"
      - git config user.name "woodpecker[bot]"
      - git config user.email "woodpecker@m0sh1.cc"
      - git remote set-url origin "https://x-access-token:$PROMOTE_TOKEN@github.com/sm-moshi/act.git"
      - make promote
