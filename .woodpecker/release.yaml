# Go release — goreleaser on tag push (GitHub release, no Docker images)
when:
  - event: tag
    ref: "refs/tags/v*"

steps:
  - name: release
    image: goreleaser/goreleaser:v2.15.3@sha256:69d129ef9463130cf903a638e74a8e41193ff15a2e25010d1bbb5ba97f5f3762
    environment:
      CGO_ENABLED: "0"
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - goreleaser release --clean
