# Go release — goreleaser on tag push (GitHub release, no Docker images)
when:
  - event: tag
    ref: "refs/tags/v*"

steps:
  - name: release
    image: harbor.m0sh1.cc/hub/goreleaser/goreleaser:v2
    environment:
      CGO_ENABLED: "0"
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - goreleaser release --clean
