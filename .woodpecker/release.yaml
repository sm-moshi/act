# Go release — goreleaser on tag push (GitHub release, no Docker images)
when:
  - event: tag
    ref: "refs/tags/v*"

steps:
  - name: release
    image: goreleaser/goreleaser:v2.15.4@sha256:579eee23514fa647adcc669b5875f866f1c1faf5a0464aec4614a9121684c06c
    environment:
      CGO_ENABLED: "0"
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - goreleaser release --clean
