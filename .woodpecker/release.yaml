# Go release — goreleaser on tag push (GitHub release, no Docker images)
when:
  - event: tag
    ref: "refs/tags/v*"

steps:
  - name: release
    image: goreleaser/goreleaser:v2.15.2@sha256:5be644c8c779677d069b7f50d5e655274c65b5e188c41268abd5b3713c416527
    environment:
      CGO_ENABLED: "0"
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - goreleaser release --clean
