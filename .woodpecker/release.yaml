# Go release — goreleaser on tag push (GitHub release, no Docker images)
when:
  - event: tag
    ref: "refs/tags/v*"

steps:
  - name: release
    image: goreleaser/goreleaser:v2.14.3@sha256:848430a900a83ca0e18f2f149fb4ddcdaea74a667aa07224268b97d448833591
    environment:
      CGO_ENABLED: "0"
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - goreleaser release --clean
