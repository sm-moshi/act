# Go vet — built-in static analysis
when:
  - event: manual
  - event: pull_request
  - event: push
    branch: develop

steps:
  - name: restore-cache
    failure: ignore
    image: meltwater/drone-cache
    settings:
      backend: s3
      endpoint:
        from_secret: garage_s3_endpoint
      access-key:
        from_secret: garage_s3_access_key
      secret-key:
        from_secret: garage_s3_secret_key
      region: garage
      bucket: buildkit-cache
      path-style: true
      restore: true
      cache_key: "act-go-{{ checksum \"go.sum\" }}"
      mount:
        - .go-mod-cache

  - name: vet
    image: dhi.io/golang:1.26.1-dev
    environment:
      CGO_ENABLED: "0"
      GOMODCACHE: /woodpecker/src/sm-moshi/act/.go-mod-cache
    commands:
      - go vet ./...
      - go install honnef.co/go/tools/cmd/staticcheck@latest
      - staticcheck ./...

  - name: rebuild-cache
    failure: ignore
    image: meltwater/drone-cache
    settings:
      backend: s3
      endpoint:
        from_secret: garage_s3_endpoint
      access-key:
        from_secret: garage_s3_access_key
      secret-key:
        from_secret: garage_s3_secret_key
      region: garage
      bucket: buildkit-cache
      path-style: true
      rebuild: true
      cache_key: "act-go-{{ checksum \"go.sum\" }}"
      mount:
        - .go-mod-cache
    when:
      - status: [success, failure]
