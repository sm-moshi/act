# Go vet — built-in static analysis
# Runs first (fast fail) — build and test depend on this
when:
  - event: manual
  - event: pull_request
  - event: push
    branch: develop

steps:
  - name: vet
    image: dhi.io/golang:1.26.3-debian13-dev@sha256:972b3b41ae70170229bd24c019dd60465130be297739a9bb64d834c21ac1a27b
    volumes:
      - woodpecker-pipeline-cache:/woodpecker/cache
    environment:
      CGO_ENABLED: "0"
      GOMODCACHE: /woodpecker/cache/act/go-mod
      GOCACHE: /woodpecker/cache/act/go-build
    commands:
      - mkdir -p "$GOMODCACHE" "$GOCACHE"
      - go vet ./...
      - go install honnef.co/go/tools/cmd/staticcheck@latest
      - staticcheck $(go list ./... | grep -v /artifacts)

  - name: codespell
    image: dhi.io/uv:0.11.13-debian13-dev@sha256:3575b48c16ea820bdc230dd00a711571e8aeb6469d8ebeb3d1cb225dbcf2204b
    commands:
      - uv tool run codespell
