# Go vet — built-in static analysis
# Runs first (fast fail) — build and test depend on this
when:
  - event: manual
  - event: pull_request
  - event: push
    branch: develop

steps:
  - name: vet
    image: dhi.io/golang:1.26.2-debian13-dev@sha256:b50864310796206ff91b76f04e0cd4f13c29b7721d7571336bfc75a116c40693
    volumes:
      - woodpecker-pipeline-cache:/woodpecker/cache
    environment:
      CGO_ENABLED: "0"
      GOMODCACHE: /woodpecker/cache/act/go-mod
      GOCACHE: /woodpecker/cache/act/go-build
    commands:
      - mkdir -p "$GOMODCACHE" "$GOCACHE"
      - go vet ./...
      - go install honnef.co/go/tools/cmd/staticcheck@latest
      - staticcheck $(go list ./... | grep -v /artifacts)

  - name: codespell
    image: dhi.io/uv:0.11.11-debian13-dev@sha256:04ff4eaf35f55a9d7d7137aff6f7661839e224a8a1d6aa388e8ba4cef9386300
    commands:
      - uv tool run codespell
