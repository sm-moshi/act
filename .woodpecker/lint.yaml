# Go lint — golangci-lint
when:
  - event: manual
  - event: pull_request
  - event: push
    branch: develop

steps:
  - name: lint
    image: harbor.m0sh1.cc/hub/golangci/golangci-lint:v2.10.1
    environment:
      CGO_ENABLED: "0"
    commands:
      - golangci-lint run --timeout 3m --new-from-rev=HEAD~1
