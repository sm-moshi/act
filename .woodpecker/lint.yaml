# Go vet — built-in static analysis
# Runs first (fast fail) — build and test depend on this
when:
  - event: manual
  - event: pull_request
  - event: push
    branch: develop

steps:
  - name: vet
    image: dhi.io/golang:1.26.1-debian13-dev@sha256:2eaf3936008b4a31091eda26511748c1b872925fa5f674f13fbf5b53e7e777c2
    volumes:
      - woodpecker-pipeline-cache:/woodpecker/cache
    environment:
      CGO_ENABLED: "0"
      GOMODCACHE: /woodpecker/cache/act/go-mod
      GOCACHE: /woodpecker/cache/act/go-build
    commands:
      - mkdir -p "$GOMODCACHE" "$GOCACHE"
      - go vet ./...
      - go install honnef.co/go/tools/cmd/staticcheck@latest
      - staticcheck $(go list ./... | grep -v /artifacts)

  - name: codespell
    image: dhi.io/uv:0.11.3-debian13-dev@sha256:2dffc779d3a7e5998d754bc8ec858a2955c2a20c45825d16aabefbd8ff0a2850
    commands:
      - uv tool run codespell
