# Go lint — golangci-lint
when:
  - event: manual
  - event: pull_request
  - event: push
    branch: develop

steps:
  - name: restore-cache
    image: meltwater/drone-cache
    settings:
      backend: s3
      endpoint:
        from_secret: garage_s3_endpoint
      access-key:
        from_secret: garage_s3_access_key
      secret-key:
        from_secret: garage_s3_secret_key
      region: garage
      bucket: buildkit-cache
      path-style: true
      restore: true
      cache_key: "act-go-{{ checksum \"go.sum\" }}"
      mount:
        - .go-mod-cache

  - name: lint
    image: golangci/golangci-lint:v2.11.3
    environment:
      CGO_ENABLED: "0"
      GOMODCACHE: /woodpecker/src/sm-moshi/act/.go-mod-cache
    commands:
      - |
        REV=""
        if [ "${CI_PIPELINE_EVENT}" = "pull_request" ]; then
          git fetch origin "${CI_COMMIT_TARGET_BRANCH}" --depth=1
          REV="origin/${CI_COMMIT_TARGET_BRANCH}"
        elif git fetch --unshallow 2>/dev/null && git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
          REV="HEAD~1"
        elif git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
          REV="HEAD~1"
        fi
        if [ -n "$REV" ]; then
          golangci-lint run --timeout 3m --new-from-rev="$REV"
        else
          golangci-lint run --timeout 3m
        fi

  - name: rebuild-cache
    image: meltwater/drone-cache
    settings:
      backend: s3
      endpoint:
        from_secret: garage_s3_endpoint
      access-key:
        from_secret: garage_s3_access_key
      secret-key:
        from_secret: garage_s3_secret_key
      region: garage
      bucket: buildkit-cache
      path-style: true
      rebuild: true
      cache_key: "act-go-{{ checksum \"go.sum\" }}"
      mount:
        - .go-mod-cache
    when:
      - status: [success, failure]
