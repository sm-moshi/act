# Go vet — built-in static analysis
# Runs first (fast fail) — build and test depend on this
when:
  - event: manual
  - event: pull_request
  - event: push
    branch: develop

steps:
  - name: vet
    image: dhi.io/golang:1.26.2-debian13-dev@sha256:086c893153f92793f3a1541793cd4a8e8b23bfd4ccaf70c8f4261f496080fb0e
    volumes:
      - woodpecker-pipeline-cache:/woodpecker/cache
    environment:
      CGO_ENABLED: "0"
      GOMODCACHE: /woodpecker/cache/act/go-mod
      GOCACHE: /woodpecker/cache/act/go-build
    commands:
      - mkdir -p "$GOMODCACHE" "$GOCACHE"
      - go vet ./...
      - go install honnef.co/go/tools/cmd/staticcheck@latest
      - staticcheck $(go list ./... | grep -v /artifacts)

  - name: codespell
    image: dhi.io/uv:0.11.7-debian13-dev@sha256:0f9aed89a2f72eb04c5c5e080179e901c10530de4b25c3cb758dd1cf57624e41
    commands:
      - uv tool run codespell
