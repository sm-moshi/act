# Go vet — built-in static analysis
# Runs first (fast fail) — build and test depend on this
when:
  - event: manual
  - event: pull_request
  - event: push
    branch: develop

steps:
  - name: vet
    image: dhi.io/golang:1.26.2-debian13-dev@sha256:f23dec55948a320ec1663d6d40d7fd052fcf7b2ecb43c3ecdf1900843403d301
    volumes:
      - woodpecker-pipeline-cache:/woodpecker/cache
    environment:
      CGO_ENABLED: "0"
      GOMODCACHE: /woodpecker/cache/act/go-mod
      GOCACHE: /woodpecker/cache/act/go-build
    commands:
      - mkdir -p "$GOMODCACHE" "$GOCACHE"
      - go vet ./...
      - go install honnef.co/go/tools/cmd/staticcheck@latest
      - staticcheck $(go list ./... | grep -v /artifacts)

  - name: codespell
    image: dhi.io/uv:0.11.6-debian13-dev@sha256:4b70dedb0988a3fa60826a63c27c85c4be816e9faa1342e77587bd21c74c8630
    commands:
      - uv tool run codespell
