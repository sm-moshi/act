# Go build — goreleaser snapshot (no publish)
depends_on:
  - test
when:
  - event: manual
  - event: pull_request
  - event: push
    branch: develop

steps:
  - name: snapshot
    image: goreleaser/goreleaser:v2.15.2@sha256:5be644c8c779677d069b7f50d5e655274c65b5e188c41268abd5b3713c416527
    volumes:
      - woodpecker-pipeline-cache:/woodpecker/cache
    environment:
      CGO_ENABLED: "0"
      GOMODCACHE: /woodpecker/cache/act/go-mod
      GOCACHE: /woodpecker/cache/act/go-build
    commands:
      - mkdir -p "$GOMODCACHE" "$GOCACHE"
      - goreleaser build --clean --snapshot
