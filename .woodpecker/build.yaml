# Go build — goreleaser snapshot (no publish)
when:
  - event: manual
  - event: pull_request
  - event: push
    branch: develop

steps:
  - name: restore-cache
    failure: ignore
    image: meltwater/drone-cache
    settings:
      backend: s3
      endpoint:
        from_secret: garage_s3_endpoint
      access-key:
        from_secret: garage_s3_access_key
      secret-key:
        from_secret: garage_s3_secret_key
      region: garage
      bucket: buildkit-cache
      path-style: true
      restore: true
      cache_key: "act-go-{{ checksum \"go.sum\" }}"
      mount:
        - .go-mod-cache

  - name: snapshot
    image: goreleaser/goreleaser:v2.14.0
    environment:
      CGO_ENABLED: "0"
      GOMODCACHE: /woodpecker/src/github.com/sm-moshi/act/.go-mod-cache
    commands:
      - goreleaser build --clean --snapshot

  - name: rebuild-cache
    failure: ignore
    image: meltwater/drone-cache
    settings:
      backend: s3
      endpoint:
        from_secret: garage_s3_endpoint
      access-key:
        from_secret: garage_s3_access_key
      secret-key:
        from_secret: garage_s3_secret_key
      region: garage
      bucket: buildkit-cache
      path-style: true
      rebuild: true
      cache_key: "act-go-{{ checksum \"go.sum\" }}"
      mount:
        - .go-mod-cache
    when:
      - status: [success, failure]
