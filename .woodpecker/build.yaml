# Go build — goreleaser snapshot (no publish)
when:
  - event: manual
  - event: pull_request
  - event: push
    branch: develop

steps:
  - name: snapshot
    image: harbor.m0sh1.cc/hub/goreleaser/goreleaser:v2
    environment:
      CGO_ENABLED: "0"
    commands:
      - goreleaser build --clean --snapshot
