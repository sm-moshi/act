# Go build — goreleaser snapshot (no publish)
depends_on:
  - test
when:
  - event: manual
  - event: pull_request
  - event: push
    branch: develop

steps:
  - name: snapshot
    image: goreleaser/goreleaser:v2.14.3@sha256:848430a900a83ca0e18f2f149fb4ddcdaea74a667aa07224268b97d448833591
    volumes:
      - woodpecker-pipeline-cache:/woodpecker/cache
    backend_options:
      kubernetes:
        securityContext:
          fsGroupChangePolicy: OnRootMismatch
    environment:
      CGO_ENABLED: "0"
      GOMODCACHE: /woodpecker/cache/act/go-mod
      GOCACHE: /woodpecker/cache/act/go-build
    commands:
      - mkdir -p "$GOMODCACHE" "$GOCACHE"
      - goreleaser build --clean --snapshot
