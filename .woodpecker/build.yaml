# Go build — goreleaser snapshot (no publish)
depends_on:
  - test
when:
  - event: manual
  - event: pull_request
  - event: push
    branch: develop

steps:
  - name: snapshot
    image: goreleaser/goreleaser:v2.15.3@sha256:69d129ef9463130cf903a638e74a8e41193ff15a2e25010d1bbb5ba97f5f3762
    volumes:
      - woodpecker-pipeline-cache:/woodpecker/cache
    environment:
      CGO_ENABLED: "0"
      GOMODCACHE: /woodpecker/cache/act/go-mod
      GOCACHE: /woodpecker/cache/act/go-build
    commands:
      - mkdir -p "$GOMODCACHE" "$GOCACHE"
      - goreleaser build --clean --snapshot
