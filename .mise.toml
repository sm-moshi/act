min_version = "2026.1.0"

[settings]
auto_install           = true
not_found_auto_install = true
task_run_auto_install  = true

[tools]
# Act upstream golangci config states "Minimum golangci-lint version required: v1.46.0"
# Pin something modern (adjust later if Act CI pins differently).
go            = "latest"
golangci-lint = "2.11.3"

# CI-style helpers Act uses
actionlint = "1.7.11"
gitleaks   = "8.30.0"
node       = "24.14.0"
python     = "3.14.3"

# Use project-local prettier (via npx) but ensure node exists.
# markdownlint-cli2 is Node-based; install/run via npx.
# If you later add the missing config file, we can wire that tool too.

[tasks.fmt-go]
description = "Format Go code"
run = """
set -euo pipefail
gofmt -w .
"""

[tasks.lint-go]
description = "golangci-lint using .golangci.yml"
run = """
set -euo pipefail
golangci-lint run -c .golangci.yml ./cmd/... ./pkg/... .
"""

[tasks.lint-actions]
description = "Lint GitHub Actions workflows (excludes test-* fixtures)"
run = """
set -euo pipefail
find .github/workflows -name '*.yml' ! -name 'test-*' -print0 | xargs -0 actionlint
"""

[tasks.lint-secrets]
description = "gitleaks with repo ignore file"
run = """
set -euo pipefail
gitleaks detect --redact --verbose
"""

[tasks.fmt-prettier]
description = "Format supported files with Prettier using upstream .prettierrc.yml and .prettierignore"
run = """
set -euo pipefail
npx --yes prettier --config .prettierrc.yml --ignore-path .prettierignore --write .
"""

[tasks.lint-markdown]
description = "markdownlint using upstream .markdownlint.yml"
run = """
set -euo pipefail
npx --yes markdownlint-cli2 --config .markdownlint.yml "**/*.md" "#.vscode" "#report" "#.venv" "#node_modules" "#**/node_modules"
"""

[tasks.lint]
description = "Run the local lint suite (fork baseline)"
run = [
	"mise run lint-go",
	"mise run lint-actions",
	"mise run lint-spelling",
	"mise run lint-markdown",
	"mise run lint-secrets",
]

[tasks.build]
description = "Build act binary to dist/local/act"
run = """
set -euo pipefail
VERSION=$(git describe --tags --dirty --always 2>/dev/null | sed 's/^v//' || cat VERSION)
go build -ldflags "-X main.version=${VERSION}" -o dist/local/act main.go
"""

[tasks.test]
description = "Run all Go tests (matches Makefile 'go test ./...')"
run = """
set -euo pipefail
go test ./cmd/... ./pkg/...
"""

[tasks.test-short]
description = "Run Go tests in short mode (skip slow/integration tests)"
run = """
set -euo pipefail
go test -short ./cmd/... ./pkg/...
"""

[tasks.test-run]
description = "Run a specific test by name: mise run test-run TestName"
usage = "test-run <test_name>"
run = """
set -euo pipefail
go test -v -run "${1:?usage: mise run test-run TestName}" ./cmd/... ./pkg/...
"""

[tasks.tidy]
description = "Run go mod tidy"
run = """
set -euo pipefail
go mod tidy
"""

[tasks.install]
description = "Build and install act to /usr/local/bin"
depends = ["build"]
run = """
set -euo pipefail
cp dist/local/act /usr/local/bin/act
chmod 755 /usr/local/bin/act
act --version
"""

[tasks.pr]
description = "Full PR prep: tidy, format, lint, test"
run = [
	"mise run tidy",
	"mise run fmt-go",
	"mise run lint",
	"mise run test",
]

[tasks.py-venv]
description = "Create/update local Python venv for repo tooling"
run = """
set -euo pipefail
if [ ! -d .venv ]; then
	python -m venv .venv
fi
. .venv/bin/activate
python -m pip install -U pip
python -m pip install -U codespell
"""

[tasks.lint-spelling]
description = "codespell using .codespellrc (via local venv)"
run = """
set -euo pipefail
mise run py-venv
. .venv/bin/activate
codespell --config .codespellrc
"""
